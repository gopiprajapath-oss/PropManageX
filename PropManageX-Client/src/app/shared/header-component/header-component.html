<div class="header d-flex justify-content-between align-items-center p-4  border-bottom">
 
  <!-- Dynamic Dashboard Title -->
  <div class="title h5 mb-0">
    {{ user?.role }} Dashboard
  </div>
 
  <div class="actions d-flex align-items-center position-relative">
 
    <!-- Profile Icon -->
    <img 
      src="assets/profile.png"
      alt="Profile"
      class="profile-icon rounded-circle me-2"
      (click)="toggleProfile()"
      style="cursor: pointer;"
    />
 
    <!-- Logout -->
    <button class="btn btn-sm btn-outline-danger logout-btn" (click)="logout()">
      Logout
    </button>
 
    <!-- Profile Dropdown -->
    @if (showProfile) {
    <div class="profile-dropdown shadow p-3 bg-black text-white position-absolute end-0 mt-2" style="width: 200px; z-index: 1000;">
    <p><strong>Name:</strong> {{ user?.name }}</p>
    <p><strong>Email:</strong> {{ user?.email }}</p>
    <p><strong>Role:</strong> {{ user?.role }}</p>
    </div>
}
 
 
  </div>
 
</div>
