<div class="auth-page-container">
  <div class="auth-card">
    <div class="auth-card-header">
      <h1 class="auth-title">Login</h1>
      <p class="auth-subtitle">Enter your email and password to access PropManageX</p>
    </div>

    <div class="auth-card-body">
      <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
        <div class="ui-field-group">
          <label class="ui-label" for="email">Email</label>
          <input 
            id="email"
            type="email" 
            formControlName="email"
            class="ui-input" 
            [class.ui-input-error]="form.get('email')?.invalid && form.get('email')?.touched"
            placeholder="name@example.com" />
        </div>

        <div class="ui-field-group">
          <label class="ui-label" for="password">Password</label>
          <input 
            id="password"
            type="password" 
            formControlName="password"
            class="ui-input" 
            [class.ui-input-error]="form.get('password')?.invalid && form.get('password')?.touched"
            placeholder="••••••••" />
        </div>

        @if (error()) {
          <div class="ui-error-alert">
            {{ error() }}
          </div>
        }

        <button type="submit" class="ui-button-primary" [disabled]="loading()">
          @if (loading()) {
            <span class="ui-spinner"></span>
            Authenticating...
          } @else {
            Sign In
          }
        </button>
      </form>
    </div>
  </div>
</div>
