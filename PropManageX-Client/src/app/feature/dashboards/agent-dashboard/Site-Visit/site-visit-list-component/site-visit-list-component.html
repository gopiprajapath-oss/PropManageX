<div class="container">

  <div class="header">
    <h2>Site Visits</h2>
    <button class="add-btn" (click)="addVisit()">Add Visit</button>
  </div>

  <!-- Show loading state -->
  <div *ngIf="loading()">Loading site visits...</div>

  <!-- Show table only when not loading -->
  <table class="table" *ngIf="!loading()">
    <thead>
      <tr>
        <th>Lead ID</th>
        <th>Visit Date</th>
        <th>Agent ID</th>
        <th>Notes</th>
        <th>Actions</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let visit of visits()">
        <td>{{ visit.leadID }}</td>
        <td>{{ visit.visitDate | date:'mediumDate' }}</td>
        <td>{{ visit.agentID }}</td>
        <td>{{ visit.notes }}</td>
        <td>
          <button class="edit-btn" (click)="editVisit(visit.visitID)">Edit</button>
          <button class="delete-btn" (click)="deleteVisit(visit.visitID)">Delete</button>
        </td>
      </tr>
    </tbody>
  </table>

</div>
