<div class="ui-card form-panel mx-auto">
  <div class="ui-card-header">
    <h3 class="ui-heading m-0">
      @if (mode() === 'dispatch') {
        Dispatch Vendor for Ticket #{{ targetId() }}
      } @else {
        Update Vendor Assignment #{{ targetId() }}
      }
    </h3>
  </div>

  <div class="ui-card-content">
    @if (error()) {
      <div class="ui-alert ui-alert-error mb-4" role="alert">
        {{ error() }}
      </div>
    }

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="d-flex flex-column gap-3">
      
      <div class="form-group">
        <label class="ui-label">Vendor Name <span class="text-danger">*</span></label>
        <input 
          type="text" 
          class="ui-input ui-focus-ring w-100" 
          formControlName="vendorName" 
          placeholder="e.g. Ace Plumbing"
          [class.input-error]="form.get('vendorName')?.invalid && form.get('vendorName')?.touched">
      </div>

      <div class="form-group">
        <label class="ui-label">Expected Completion Date</label>
        <input 
          type="date" 
          class="ui-input ui-focus-ring w-100" 
          formControlName="completionDate">
      </div>

      <div class="form-group">
        <label class="ui-label">Estimated Cost</label>
        <div class="input-with-prefix">
          <span class="ui-prefix">₹</span>
          <input 
            type="number" 
            class="ui-input ui-focus-ring w-100 prefix-input" 
            formControlName="cost"
            min="0"
            placeholder="0.00">
        </div>
      </div>

      <div class="form-actions mt-4 d-flex gap-2">
        <button 
          type="submit" 
          class="ui-btn ui-btn-primary ui-focus-ring flex-grow-1" 
          [disabled]="isLoading() || form.invalid">
          
          @if (isLoading()) {
            <span class="spinner-border spinner-border-sm me-2"></span>
            Processing...
          } @else if (mode() === 'dispatch') {
            Confirm & Dispatch
          } @else {
            Save Changes
          }
        </button>
        
        <button 
          type="button" 
          class="ui-btn ui-btn-outline ui-focus-ring" 
          (click)="cancel()">
          Cancel
        </button>
      </div>
      
    </form>
  </div>
</div>
